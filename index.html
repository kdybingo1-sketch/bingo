<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 웹페이지</title>
    <style>
        /* Toss 스타일을 위한 폰트 및 기본 설정 */
        body {
            font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f4f6f8; /* 토스 앱 배경과 유사한 색상 */
            color: #333d4b;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background-color: #ffffff;
            padding: 24px; /* 패딩 조정 */
            border-radius: 24px;
            box-shadow: 0 4px 24px rgba(0, 33, 86, 0.08); /* 그림자 미세 조정 */
            width: 90%;
            max-width: 380px;
            box-sizing: border-box;
            text-align: left; /* 컨텐츠를 좌측 정렬로 변경 */
        }
        .stock-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .stock-logo {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid #e8e8e8;
        }
        .stock-name {
            font-size: 22px;
            font-weight: 700;
            margin: 0;
            color: #333d4b;
        }
        .stock-price {
            font-size: 40px;
            font-weight: 800; /* 더 굵게 강조 */
            color: #1e2025;
            margin: 0;
        }
        .change-container {
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .change-label {
            font-size: 15px;
            color: #8491a7;
        }
        .stock-change {
            font-size: 17px;
            font-weight: 600;
        }
        .positive {
            color: #f04452; /* 토스 증권 상승 색상 */
        }
        .divider {
            border: none;
            height: 1px;
            background-color: #f0f2f5;
            margin: 24px 0;
        }
        .button-group {
            display: flex;
            gap: 12px;
        }
        .btn {
            flex: 1; /* 버튼이 공간을 균등하게 차지하도록 */
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-sell {
            background-color: #e8eaed;
            color: #4e5968;
        }
        .btn-buy {
            background-color: #0064ff; /* 토스 시그니처 블루 */
            color: #ffffff;
        }

        /* 입금 화면 스타일 */
        .view-title {
            font-size: 22px;
            font-weight: 700;
            margin: 0 0 8px 0;
        }
        .view-desc {
            font-size: 15px;
            color: #5a6573;
            margin: 0 0 24px 0;
            line-height: 1.5;
        }
        .account-box {
            display: flex;
            align-items: center;
            background-color: #f4f6f8;
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 24px;
        }
        .account-box .bank-logo {
            width: 32px;
            height: 32px;
            margin-right: 12px;
            border-radius: 50%;
        }
        .account-details {
            flex: 1;
        }
        .account-details .bank-name {
            font-size: 14px;
            color: #5a6573;
            display: block;
        }
        .account-details .account-number {
            font-size: 17px;
            font-weight: 600;
            color: #333d4b;
            display: block;
        }
        .btn-copy {
            background-color: #e8eaed;
            color: #4e5968;
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-back {
            width: 100%;
            background-color: #e8eaed;
            color: #4e5968;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- 1. 주식 정보 화면 -->
        <div id="stock-view">
            <div class="stock-header">
                <img src="https://www.skhynix.com/favicon.ico" alt="SK하이닉스 로고" class="stock-logo">
                <h1 class="stock-name">SK하이닉스</h1>
            </div>
            <p class="stock-price">2,100,000원</p>
            <div class="change-container">
                <span class="change-label">어제보다</span>
                <span class="stock-change positive">▲ 1,890,000 (+900.00%)</span>
            </div>
            <hr class="divider">
            <div class="button-group">
                <button class="btn btn-sell">매도하기</button>
                <button class="btn btn-buy">매수하기</button>
            </div>
        </div>

        <!-- 2. 입금 안내 화면 (처음에는 숨겨져 있음) -->
        <div id="deposit-view" style="display: none;">
            <h2 class="view-title">매수 금액 입금</h2>
            <p class="view-desc">아래 계좌로 입금하면 주문이 완료돼요.</p>
            <div class="account-box">
                <img src="https://sol.shinhan.com/common/img/logo_shinhan.png" alt="신한은행 로고" class="bank-logo">
                <div class="account-details">
                    <span class="bank-name">신한은행</span>
                    <span class="account-number">110-474-316847</span>
                </div>
                <button class="btn-copy">복사</button>
            </div>
            <button class="btn btn-back">돌아가기</button>
        </div>
    </div>

    <script>
        // 화면 요소들을 변수에 저장
        const stockView = document.getElementById('stock-view');
        const depositView = document.getElementById('deposit-view');
        
        // 버튼 요소들을 변수에 저장
        const buyButton = document.querySelector('.btn-buy');
        const backButton = document.querySelector('.btn-back');
        const copyButton = document.querySelector('.btn-copy');
        const accountNumber = document.querySelector('.account-number').innerText;

        // '매수하기' 버튼 클릭 시
        buyButton.addEventListener('click', () => {
            stockView.style.display = 'none'; // 주식 화면 숨기기
            depositView.style.display = 'block'; // 입금 화면 보이기
        });

        // '돌아가기' 버튼 클릭 시
        backButton.addEventListener('click', () => {
            depositView.style.display = 'none'; // 입금 화면 숨기기
            stockView.style.display = 'block'; // 주식 화면 보이기
        });

        // '복사' 버튼 클릭 시
        copyButton.addEventListener('click', () => {
            // 클립보드에 계좌번호 복사
            navigator.clipboard.writeText(accountNumber).then(() => {
                alert('계좌번호가 복사되었습니다.');
            }).catch(err => {
                console.error('복사 실패:', err);
                alert('계좌번호 복사에 실패했습니다.');
            });
        });
    </script>
</body>
</html>
